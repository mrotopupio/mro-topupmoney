<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>เติมเงิน</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topup-box">
    <h2>💸 เติมเงิน</h2>

    <form action="https://mro-topupmoney.rf.gd/upload.php" method="POST" enctype="multipart/form-data">
        
        <input type="text" name="username" placeholder="👤 Username" required>

        <input type="number" name="amount" placeholder="💰 จำนวนเงิน" required>

        <input type="file" name="slip" accept="image/*" required>

        <button type="submit">📤 อัปโหลดสลิป</button>

    </form>

</div>

</body>
</html>
