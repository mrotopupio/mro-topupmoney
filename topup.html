<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MRO FREYA - เติมเงิน</title>
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:url("bg.jpg") center/cover no-repeat fixed;
    color:#fff;
}
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.78);
    z-index:-1;
}
.topup-box{
    width:90%;
    max-width:420px;
    margin:40px auto;
    padding:25px;
    border-radius:20px;
    background:rgba(20,20,30,.95);
    box-shadow:0 0 30px rgba(0,0,0,.8);
}
h2{
    text-align:center;
    color:#ffcc00;
}
input,button{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:10px;
    box-sizing:border-box;
}
input{
    background:#111520;
    color:#fff;
}
button{
    background:linear-gradient(90deg,#00ffcc,#0099ff);
    color:#fff;
    cursor:pointer;
}
button:hover{
    transform:scale(1.03);
}
.qr-card{
    margin-top:15px;
    padding:15px;
    border-radius:15px;
    background:#161b24;
    text-align:center;
}
.qr-img{
    width:220px;
    max-width:100%;
    background:#fff;
    padding:10px;
    border-radius:12px;
}
.copy-btn{
    display:block;
    text-decoration:none;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    background:linear-gradient(90deg,#ffcc00,#ff8800);
    color:#000;
    font-weight:bold;
}
</style>
</head>
<body>
<div class="topup-box">
    <h2>💸 เติมเงิน</h2>
    <input type="text" id="username" placeholder="👤 Username">
    <input type="number" id="amount" placeholder="💰 จำนวนเงิน">
    <button onclick="generateQR()">สร้าง QR Code</button>
    <div id="qrBox"></div>
</div>
<script>
function generateQR(){
    let username = document.getElementById("username").value.trim();
    let amount = document.getElementById("amount").value.trim();
    if(username === ""){
        alert("กรอก Username");
        return;
    }
    if(amount === ""){
        alert("กรอกจำนวนเงิน");
        return;
    }
    let phone = "1509901258972";
    let accountName = "นาย ยรรยง รัตนจุฑาภรณ์";
    let qrUrl = "https://promptpay.io/" + phone + "/" + amount + ".png";
    document.getElementById("qrBox").innerHTML = `
        <div class="qr-card">
            <img src="${qrUrl}" class="qr-img">
            <p>📱 ชำระ ${amount} บาท</p>
            <p>👤 ${username}</p>
            <p>🏦 ${accountName}</p>
            <a href="${qrUrl}" download="qr.png" class="copy-btn">
                💾 บันทึก QR
            </a>
            <form action="https://mro-topupmoney.rf.gd/upload.php" method="POST" enctype="multipart/form-data">
                <input type="hidden" name="username" value="${username}">
                <input type="hidden" name="amount" value="${amount}">
                <input type="file" name="slip" accept="image/*" required>
                <button type="submit">📤 อัปโหลดสลิป</button>
            </form>
        </div>
    `;
}
</script>
</body>
</html>
