<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MRO FREYA</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:Arial,sans-serif;
    background:url("bg.jpg") center/cover no-repeat fixed;
    min-height:100vh;
}

.overlay{
    width:100%;
    min-height:100vh;
    background:rgba(0,0,0,.78);
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

.box{
    text-align:center;
    max-width:500px;
    padding:30px;
    border-radius:20px;
    background:rgba(20,20,20,.6);
    box-shadow:0 0 30px rgba(255,215,0,.4);
}

.logo{
    width:170px;
    height:170px;
    object-fit:contain;
    margin-bottom:20px;
}

.title{
    font-size:46px;
    color:#ffd700;
    margin-bottom:10px;
}

.sub{
    color:#fff;
    margin-bottom:25px;
}

.btn{
    display:inline-block;
    padding:18px 50px;
    font-size:26px;
    font-weight:bold;
    color:#111;
    text-decoration:none;
    border-radius:15px;
    background:linear-gradient(90deg,#ffd700,#ff9900);
}

.footer{
    margin-top:20px;
    color:#ccc;
    font-size:13px;
}
</style>
</head>

<body>
<div class="overlay">
    <div class="box">

        <img src="logo.png" class="logo">

        <div class="title">MRO FREYA</div>

        <div class="sub">
            ระบบเติมเงินอัตโนมัติ รวดเร็ว ปลอดภัย 24 ชั่วโมง
        </div>

        <!-- ✅ แก้ตรงนี้ -->
        <a href="topup.html" class="btn">💰 เติมเงินเลย</a>

        <div class="footer">
            © 2026 MRO FREYA
        </div>

    </div>
</div>
</body>
</html>
