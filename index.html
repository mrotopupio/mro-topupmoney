<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MRO FREYA - เติมเงิน</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:url("bg.jpg") center/cover no-repeat fixed;
    color:#fff;
}
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.78);
    z-index:-1;
}

.topup-box{
    width:90%;
    max-width:430px;
    margin:40px auto;
    padding:25px;
    border-radius:20px;
    background:rgba(20,20,30,.95);
    box-shadow:0 0 30px rgba(0,0,0,.8);
}

h2{
    text-align:center;
    color:#ffd700;
    text-shadow:0 0 10px gold;
}

input,button{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:10px;
    box-sizing:border-box;
}

input{
    background:#111520;
    color:#fff;
}

button{
    background:linear-gradient(90deg,#00ffcc,#0099ff);
    color:#fff;
    cursor:pointer;
    font-weight:bold;
    font-size:16px;
}

button:hover{
    transform:scale(1.03);
}

.qr-card{
    margin-top:15px;
    padding:15px;
    border-radius:15px;
    background:#161b24;
    text-align:center;
    animation:fadeIn .4s ease;
}

.qr-img{
    width:220px;
    max-width:100%;
    background:#fff;
    padding:10px;
    border-radius:12px;
}

.preview{
    width:150px;
    margin-top:10px;
    border-radius:10px;
    display:none;
}

.copy-btn{
    display:block;
    text-decoration:none;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    background:linear-gradient(90deg,#ffcc00,#ff8800);
    color:#000;
    font-weight:bold;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="topup-box">

    <h2>💸 เติมเงิน</h2>

    <input type="text" id="username" placeholder="👤 Username">
    <input type="number" id="amount" placeholder="💰 จำนวนเงิน">

    <button onclick="generateQR()">สร้าง QR Code</button>

    <div id="qrBox"></div>

</div>

<script>
function generateQR(){

    let username = document.getElementById("username").value.trim();
    let amount = document.getElementById("amount").value.trim();

    if(username==""){
        alert("กรอก Username");
        return;
    }

    if(amount==""){
        alert("กรอกจำนวนเงิน");
        return;
    }

    let phone = "1509901258972";
    let accountName = "นาย ยรรยง รัตนจุฑาภรณ์";
    let qrUrl = "https://promptpay.io/" + phone + "/" + amount + ".png";

    document.getElementById("qrBox").innerHTML = `
    <div class="qr-card">

        <img src="${qrUrl}" class="qr-img">

        <p>📱 ชำระ ${amount} บาท</p>
        <p>👤 ${username}</p>
        <p>🏦 ${accountName}</p>

        <a href="${qrUrl}" download="qr.png" class="copy-btn">
            💾 บันทึก QR
        </a>

        <form action="upload.php" method="POST" enctype="multipart/form-data" onsubmit="disableBtn(this)">

            <input type="hidden" name="username" value="${username}">
            <input type="hidden" name="amount" value="${amount}">

            <input type="file" name="slip" accept="image/*" required onchange="previewSlip(event)">

            <img class="preview">

            <button type="submit">📤 อัปโหลดสลิป</button>

        </form>

    </div>
    `;

    document.getElementById("qrBox").scrollIntoView({behavior:"smooth"});
}

function previewSlip(e){

    let file = e.target.files[0];
    if(!file) return;

    let reader = new FileReader();

    reader.onload = function(){
        let img = e.target.parentElement.querySelector(".preview");
        img.src = reader.result;
        img.style.display = "block";
    }

    reader.readAsDataURL(file);
}

function disableBtn(form){
    let btn = form.querySelector("button");
    btn.innerText = "⏳ กำลังอัปโหลด...";
    btn.disabled = true;
}
</script>

</body>
</html>
